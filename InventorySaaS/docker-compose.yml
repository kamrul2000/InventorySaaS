version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: inventorysaas-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SQL_SA_PASSWORD:-YourStrong!Passw0rd}
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: inventorysaas-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: inventorysaas-api
    ports:
      - "5000:8080"
      - "5001:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=InventorySaaS;User Id=sa;Password=${SQL_SA_PASSWORD:-YourStrong!Passw0rd};TrustServerCertificate=true;MultipleActiveResultSets=true
      - ConnectionStrings__HangfireConnection=Server=sqlserver;Database=InventorySaaS_Hangfire;User Id=sa;Password=${SQL_SA_PASSWORD:-YourStrong!Passw0rd};TrustServerCertificate=true
      - ConnectionStrings__Redis=redis:6379
      - JwtSettings__Secret=${JWT_SECRET:-YourSuperSecretKeyThatIsAtLeast32CharactersLong!@#$$%}
      - JwtSettings__Issuer=InventorySaaS
      - JwtSettings__Audience=InventorySaaS.Client
      - JwtSettings__ExpiryMinutes=60
      - AllowedOrigins__0=http://localhost:4200
      - AllowedOrigins__1=http://localhost
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./inventory-saas-web
      dockerfile: Dockerfile
    container_name: inventorysaas-frontend
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  sqlserver-data:
  redis-data:
