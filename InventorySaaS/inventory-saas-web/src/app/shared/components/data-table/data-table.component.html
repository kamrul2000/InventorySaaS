<div class="table-container">
  <div class="table-toolbar">
    <div class="search-box">
      <mat-icon class="search-icon">search</mat-icon>
      <input class="search-input"
             [(ngModel)]="searchValue"
             (input)="onSearch()"
             placeholder="Search...">
    </div>
  </div>

  @if (loading) {
    <div class="loading-overlay">
      <mat-spinner diameter="36"></mat-spinner>
    </div>
  }

  <div class="table-wrap">
    <table mat-table [dataSource]="dataSource" matSort (matSortChange)="onSort($event)">

      @for (col of columns; track col.key) {
        <ng-container [matColumnDef]="col.key">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ col.label }}</th>
          <td mat-cell *matCellDef="let row">
            @switch (col.type) {
              @case ('date') {
                {{ row[col.key] | date:'mediumDate' }}
              }
              @case ('currency') {
                {{ row[col.key] | currency }}
              }
              @case ('boolean') {
                <mat-slide-toggle
                  [checked]="row[col.key]"
                  (change)="onAction('toggle:' + col.key, row)"
                  color="primary">
                </mat-slide-toggle>
              }
              @default {
                {{ row[col.key] }}
              }
            }
          </td>
        </ng-container>
      }

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Action</th>
        <td mat-cell *matCellDef="let row">
          <div class="action-btns">
            <button class="action-btn view-btn" (click)="onAction('view', row)" title="View">
              <mat-icon>visibility</mat-icon>
            </button>
            <button class="action-btn edit-btn" (click)="onAction('edit', row)" title="Edit">
              <mat-icon>edit_note</mat-icon>
            </button>
            <button class="action-btn delete-btn" (click)="onAction('delete', row)" title="Delete">
              <mat-icon>delete_outline</mat-icon>
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell no-data" [attr.colspan]="displayedColumns.length">
          No data found
        </td>
      </tr>
    </table>
  </div>

  <mat-paginator [length]="totalCount"
                 [pageSize]="pageSize"
                 [pageSizeOptions]="[10, 25, 50]"
                 (page)="onPage($event)"
                 showFirstLastButtons>
  </mat-paginator>
</div>
