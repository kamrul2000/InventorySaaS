<div class="confirm-dialog">
  <h2 class="dialog-title">{{ data.title }}</h2>
  <p class="dialog-message">{{ data.message }}</p>
  <div class="dialog-actions">
    <button class="btn-cancel" (click)="dialogRef.close(false)">Cancel</button>
    <button class="btn-confirm" (click)="dialogRef.close(true)">Confirm</button>
  </div>
</div>
