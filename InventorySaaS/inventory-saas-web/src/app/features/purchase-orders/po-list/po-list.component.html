<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">Purchase Orders</h1>
      <p class="page-subtitle">Track and manage supplier purchase orders</p>
    </div>
    <button class="btn-primary" (click)="create()">
      <mat-icon>add</mat-icon> Create PO
    </button>
  </div>

  <div class="filters">
    <div class="filter-group">
      <label class="filter-label">Status</label>
      <select class="form-select" [(ngModel)]="statusFilter" (ngModelChange)="loadOrders()">
        <option value="">All Statuses</option>
        <option value="Draft">Draft</option>
        <option value="Submitted">Submitted</option>
        <option value="Approved">Approved</option>
        <option value="Received">Received</option>
        <option value="Cancelled">Cancelled</option>
      </select>
    </div>
  </div>

  <app-data-table
    [columns]="columns"
    [data]="orders"
    [totalCount]="totalCount"
    [pageSize]="pageSize"
    [loading]="loading"
    (pageChange)="onPageChange($event)"
    (sortChange)="onSortChange($event)"
    (searchChange)="onSearch($event)"
    (rowAction)="onRowAction($event)">
  </app-data-table>
</div>
