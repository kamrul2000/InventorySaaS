<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">Create Purchase Order</h1>
      <p class="page-subtitle">Fill in the details to create a new purchase order</p>
    </div>
  </div>

  <div class="form-card">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Supplier *</label>
          <select class="form-select" formControlName="supplierId">
            <option value="">Select supplier</option>
            @for (s of suppliers; track s.id) {
              <option [value]="s.id">{{ s.name }}</option>
            }
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Warehouse *</label>
          <select class="form-select" formControlName="warehouseId">
            <option value="">Select warehouse</option>
            @for (wh of warehouses; track wh.id) {
              <option [value]="wh.id">{{ wh.name }}</option>
            }
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Expected Delivery Date</label>
          <input type="date" class="form-input" formControlName="expectedDeliveryDate">
        </div>
        <div class="form-group"></div>
      </div>

      <div class="section-header">
        <h3 class="section-title">Line Items</h3>
        <button type="button" class="btn-add-item" (click)="addItem()">
          <mat-icon>add</mat-icon> Add Item
        </button>
      </div>

      <div formArrayName="items">
        <table class="items-table">
          <thead>
            <tr>
              <th>Product</th>
              <th>Qty</th>
              <th>Unit Price</th>
              <th>Total</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            @for (item of items.controls; track $index) {
              <tr [formGroupName]="$index">
                <td>
                  <select class="form-select table-select" formControlName="productId">
                    <option value="">Select product</option>
                    @for (p of products; track p.id) {
                      <option [value]="p.id">{{ p.name }}</option>
                    }
                  </select>
                </td>
                <td>
                  <input type="number" class="form-input table-input" formControlName="quantity" (input)="calculateLineTotal($index)">
                </td>
                <td>
                  <input type="number" class="form-input table-input" formControlName="unitPrice" step="0.01" (input)="calculateLineTotal($index)">
                </td>
                <td class="line-total">{{ items.at($index).get('lineTotal')?.value | currency }}</td>
                <td>
                  <button type="button" class="btn-remove" (click)="removeItem($index)">
                    <mat-icon>delete</mat-icon>
                  </button>
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>

      <div class="total-row">
        <strong>Grand Total: {{ grandTotal | currency }}</strong>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-secondary" (click)="cancel()">Cancel</button>
        <button type="submit" class="btn-primary" [disabled]="form.invalid || saving || items.length === 0">
          @if (saving) {
            <mat-spinner diameter="20"></mat-spinner>
          } @else {
            Create Order
          }
        </button>
      </div>
    </form>
  </div>
</div>
