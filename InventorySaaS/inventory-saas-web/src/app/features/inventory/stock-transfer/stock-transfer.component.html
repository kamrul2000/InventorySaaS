<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">Stock Transfer</h1>
      <p class="page-subtitle">Transfer stock between warehouses</p>
    </div>
    <button class="btn-primary" routerLink="/inventory">
      <mat-icon>list</mat-icon> Go to Inventory
    </button>
  </div>

  <div class="form-card">
    <form [formGroup]="form" (ngSubmit)="save()">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Product</label>
          <select class="form-select" formControlName="productId">
            <option value="" disabled>Select a product</option>
            @for (p of products; track p.id) {
              <option [value]="p.id">{{ p.name }} ({{ p.sku }})</option>
            }
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Quantity</label>
          <input class="form-input" formControlName="quantity" type="number" placeholder="Enter quantity">
        </div>
      </div>

      <h3 class="section-title">Source</h3>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Source Warehouse</label>
          <select class="form-select" formControlName="sourceWarehouseId" (change)="onSourceWarehouseChange(form.value.sourceWarehouseId)">
            <option value="" disabled>Select source warehouse</option>
            @for (wh of warehouses; track wh.id) {
              <option [value]="wh.id">{{ wh.name }}</option>
            }
          </select>
        </div>
        <div class="form-group">
          @if (sourceLocations.length > 0) {
            <label class="form-label">Source Location</label>
            <select class="form-select" formControlName="sourceLocationId">
              <option value="">-- None --</option>
              @for (loc of sourceLocations; track loc.id) {
                <option [value]="loc.id">{{ loc.name }}</option>
              }
            </select>
          }
        </div>
      </div>

      <h3 class="section-title">Destination</h3>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Destination Warehouse</label>
          <select class="form-select" formControlName="destinationWarehouseId" (change)="onDestWarehouseChange(form.value.destinationWarehouseId)">
            <option value="" disabled>Select destination warehouse</option>
            @for (wh of warehouses; track wh.id) {
              <option [value]="wh.id">{{ wh.name }}</option>
            }
          </select>
        </div>
        <div class="form-group">
          @if (destLocations.length > 0) {
            <label class="form-label">Destination Location</label>
            <select class="form-select" formControlName="destinationLocationId">
              <option value="">-- None --</option>
              @for (loc of destLocations; track loc.id) {
                <option [value]="loc.id">{{ loc.name }}</option>
              }
            </select>
          }
        </div>
      </div>

      <div class="form-group" style="margin-bottom: 20px;">
        <label class="form-label">Notes</label>
        <textarea class="form-input form-textarea" formControlName="notes" rows="2" placeholder="Optional notes"></textarea>
      </div>

      <div class="form-actions">
        <button class="btn-primary" type="submit" [disabled]="form.invalid || saving">
          Transfer
        </button>
        <button class="btn-secondary" type="button" routerLink="/inventory">Cancel</button>
      </div>
    </form>
  </div>
</div>
