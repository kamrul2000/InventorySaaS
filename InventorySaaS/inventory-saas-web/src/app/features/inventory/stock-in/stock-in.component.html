<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">Stock In</h1>
      <p class="page-subtitle">Record incoming inventory stock</p>
    </div>
    <button class="btn-primary" routerLink="/inventory">
      <mat-icon>list</mat-icon> Go to Inventory
    </button>
  </div>

  <div class="form-card">
    <form [formGroup]="form" (ngSubmit)="save()">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Product</label>
          <select class="form-select" formControlName="productId">
            <option value="" disabled>Select a product</option>
            @for (p of products; track p.id) {
              <option [value]="p.id">{{ p.name }} ({{ p.sku }})</option>
            }
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Warehouse</label>
          <select class="form-select" formControlName="warehouseId" (change)="onWarehouseChange(form.value.warehouseId)">
            <option value="" disabled>Select a warehouse</option>
            @for (wh of warehouses; track wh.id) {
              <option [value]="wh.id">{{ wh.name }}</option>
            }
          </select>
        </div>
      </div>

      @if (locations.length > 0) {
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Location</label>
            <select class="form-select" formControlName="locationId">
              <option value="">-- None --</option>
              @for (loc of locations; track loc.id) {
                <option [value]="loc.id">{{ loc.name }}</option>
              }
            </select>
          </div>
          <div class="form-group"></div>
        </div>
      }

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Quantity</label>
          <input class="form-input" formControlName="quantity" type="number" placeholder="Enter quantity">
        </div>
        <div class="form-group">
          <label class="form-label">Unit Cost</label>
          <input class="form-input" formControlName="unitCost" type="number" step="0.01" placeholder="0.00">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Batch Number</label>
          <input class="form-input" formControlName="batchNumber" placeholder="Enter batch number">
        </div>
        <div class="form-group">
          <label class="form-label">Lot Number</label>
          <input class="form-input" formControlName="lotNumber" placeholder="Enter lot number">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Expiry Date</label>
          <input class="form-input" formControlName="expiryDate" type="date">
        </div>
        <div class="form-group"></div>
      </div>

      <div class="form-group" style="margin-bottom: 20px;">
        <label class="form-label">Notes</label>
        <textarea class="form-input form-textarea" formControlName="notes" rows="2" placeholder="Optional notes"></textarea>
      </div>

      <div class="form-actions">
        <button class="btn-primary" type="submit" [disabled]="form.invalid || saving">
          Stock In
        </button>
        <button class="btn-secondary" type="button" routerLink="/inventory">Cancel</button>
      </div>
    </form>
  </div>
</div>
