<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">{{ isEditMode ? 'Edit Supplier' : 'New Supplier' }}</h1>
      <p class="page-subtitle">{{ isEditMode ? 'Update supplier details' : 'Add a new supplier to your directory' }}</p>
    </div>
    <button class="btn-primary" routerLink="/suppliers">
      <mat-icon>list</mat-icon> Go to List
    </button>
  </div>

  <div class="form-card">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Name *</label>
          <input class="form-input" formControlName="name" placeholder="Supplier name">
          @if (form.get('name')?.hasError('required') && form.get('name')?.touched) {
            <div class="form-error">Name is required</div>
          }
        </div>
        <div class="form-group">
          <label class="form-label">Code</label>
          <input class="form-input" formControlName="code" placeholder="Supplier code">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Contact Person</label>
          <input class="form-input" formControlName="contactPerson" placeholder="Contact person name">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" formControlName="email" type="email" placeholder="email@example.com">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input class="form-input" formControlName="phone" placeholder="Phone number">
        </div>
        <div class="form-group">
          <label class="form-label">Address</label>
          <input class="form-input" formControlName="address" placeholder="Street address">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">City</label>
          <input class="form-input" formControlName="city" placeholder="City">
        </div>
        <div class="form-group">
          <label class="form-label">Country</label>
          <input class="form-input" formControlName="country" placeholder="Country">
        </div>
      </div>

      <div style="margin-bottom: 20px;">
        <label class="checkbox-label">
          <input type="checkbox" formControlName="isActive">
          Active
        </label>
      </div>

      <div class="form-actions">
        <button class="btn-primary" type="submit" [disabled]="form.invalid || saving">
          @if (saving) { Saving... } @else { {{ isEditMode ? 'Update' : 'Create' }} }
        </button>
        <button class="btn-secondary" type="button" (click)="cancel()">Cancel</button>
      </div>
    </form>
  </div>
</div>
