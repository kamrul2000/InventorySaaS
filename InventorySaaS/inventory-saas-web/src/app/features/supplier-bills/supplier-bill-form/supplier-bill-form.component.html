<div class="page">
  <div class="page-header">
    <h1 class="page-title">New Supplier Bill</h1>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="form-card">
    <div class="form-row">
      <div class="form-field">
        <label>Supplier *</label>
        <select formControlName="supplierId">
          <option value="">Select supplier</option>
          @for (s of suppliers; track s.id) {
            <option [value]="s.id">{{ s.name }}</option>
          }
        </select>
      </div>
      <div class="form-field">
        <label>Supplier Invoice #</label>
        <input type="text" formControlName="supplierInvoiceNumber" placeholder="Optional" />
      </div>
    </div>

    <div class="form-row">
      <div class="form-field">
        <label>Due Date</label>
        <input type="date" formControlName="dueDate" />
      </div>
      <div class="form-field">
        <label>Notes</label>
        <input type="text" formControlName="notes" placeholder="Optional" />
      </div>
    </div>

    <h3 class="section-title">Line Items</h3>
    <table class="items-table" formArrayName="items">
      <thead>
        <tr>
          <th style="width: 36%">Description</th>
          <th>Qty</th>
          <th>Unit Price</th>
          <th>Tax %</th>
          <th>Disc %</th>
          <th>Total</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        @for (item of items.controls; track item; let i = $index) {
          <tr [formGroupName]="i">
            <td><input type="text" formControlName="description" placeholder="Item description" /></td>
            <td><input type="number" formControlName="quantity" min="1" /></td>
            <td><input type="number" formControlName="unitPrice" min="0" step="0.01" /></td>
            <td><input type="number" formControlName="taxRate" min="0" step="0.01" /></td>
            <td><input type="number" formControlName="discountRate" min="0" step="0.01" /></td>
            <td class="line-total">{{ lineTotal(item) | currency:'BDT':'৳':'1.2-2' }}</td>
            <td>
              <button type="button" class="icon-btn" (click)="removeItem(i)" [disabled]="items.length === 1">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </tr>
        }
      </tbody>
    </table>

    <button type="button" class="btn-add" (click)="addItem()">
      <mat-icon>add</mat-icon> Add Line
    </button>

    <div class="grand-total">
      <span>Total</span>
      <strong>{{ grandTotal | currency:'BDT':'৳':'1.2-2' }}</strong>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-secondary" (click)="cancel()">Cancel</button>
      <button type="submit" class="btn-primary" [disabled]="saving">
        <mat-icon>save</mat-icon> Create Bill
      </button>
    </div>
  </form>
</div>
