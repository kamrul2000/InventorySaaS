<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">Sales Orders</h1>
      <p class="page-subtitle">Manage your sales orders</p>
    </div>
    <button class="btn-primary" (click)="create()">
      <mat-icon>add</mat-icon> New Sales Order
    </button>
  </div>
  <app-data-table
    [columns]="columns"
    [data]="orders"
    [totalCount]="totalCount"
    [pageSize]="pageSize"
    [loading]="loading"
    (pageChange)="onPageChange($event)"
    (sortChange)="onSortChange($event)"
    (searchChange)="onSearch($event)"
    (rowAction)="onRowAction($event)">
  </app-data-table>
</div>
