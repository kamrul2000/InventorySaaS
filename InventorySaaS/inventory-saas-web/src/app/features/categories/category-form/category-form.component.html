<div class="dialog-container">
  <div class="dialog-header">
    <h2 class="dialog-title">{{ isEditMode ? 'Edit Category' : 'New Category' }}</h2>
    <button class="dialog-close" (click)="dialogRef.close()">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <div class="dialog-body">
    <form [formGroup]="form">
      <div class="form-group">
        <label class="form-label">Category Name</label>
        <input class="form-input" formControlName="name" placeholder="Enter category name">
        @if (form.get('name')?.hasError('required') && form.get('name')?.touched) {
          <span class="form-error">Name is required</span>
        }
      </div>

      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-input form-textarea" formControlName="description" rows="3" placeholder="Enter description"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Parent Category</label>
        <select class="form-select" formControlName="parentCategoryId">
          <option [ngValue]="null">-- None --</option>
          @for (cat of parentCategories; track cat.id) {
            <option [ngValue]="cat.id">{{ cat.name }}</option>
          }
        </select>
      </div>

      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" formControlName="isActive">
          <span>Active</span>
        </label>
      </div>
    </form>
  </div>

  <div class="dialog-actions">
    <button class="btn-secondary" (click)="dialogRef.close()">Cancel</button>
    <button class="btn-primary" (click)="save()" [disabled]="form.invalid || saving">
      {{ isEditMode ? 'Update' : 'Create' }}
    </button>
  </div>
</div>
