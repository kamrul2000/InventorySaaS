<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">{{ isEditMode ? 'Edit Customer' : 'New Customer' }}</h1>
      <p class="page-subtitle">{{ isEditMode ? 'Update customer information' : 'Add a new customer to your directory' }}</p>
    </div>
  </div>

  <div class="form-card">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Name *</label>
          <input class="form-input" formControlName="name" placeholder="Enter customer name">
          @if (form.get('name')?.hasError('required') && form.get('name')?.touched) {
            <span class="form-error">Name is required</span>
          }
        </div>
        <div class="form-group">
          <label class="form-label">Code</label>
          <input class="form-input" formControlName="code" placeholder="Enter customer code">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Customer Type</label>
          <select class="form-select" formControlName="customerType">
            <option value="">Select type</option>
            <option value="Individual">Individual</option>
            <option value="Business">Business</option>
            <option value="Government">Government</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Contact Person</label>
          <input class="form-input" formControlName="contactPerson" placeholder="Enter contact person">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" formControlName="email" type="email" placeholder="Enter email address">
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input class="form-input" formControlName="phone" placeholder="Enter phone number">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Address</label>
          <input class="form-input" formControlName="address" placeholder="Enter address">
        </div>
        <div class="form-group">
          <label class="form-label">City</label>
          <input class="form-input" formControlName="city" placeholder="Enter city">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Country</label>
          <input class="form-input" formControlName="country" placeholder="Enter country">
        </div>
        <div class="form-group" style="justify-content: flex-end;">
          <label class="checkbox-label">
            <input type="checkbox" formControlName="isActive">
            Active
          </label>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-secondary" (click)="cancel()">Cancel</button>
        <button type="submit" class="btn-primary" [disabled]="form.invalid || saving">
          @if (saving) {
            <mat-spinner diameter="20"></mat-spinner>
          } @else {
            {{ isEditMode ? 'Update' : 'Create' }}
          }
        </button>
      </div>
    </form>
  </div>
</div>
