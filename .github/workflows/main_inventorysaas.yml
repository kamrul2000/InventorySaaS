name: Build and deploy ASP.Net Core app to Azure Web App - inventorysaas

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore InventorySaaS/src/InventorySaaS.API/InventorySaaS.API.csproj

      - name: Build
        run: dotnet build InventorySaaS/src/InventorySaaS.API/InventorySaaS.API.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish InventorySaaS/src/InventorySaaS.API/InventorySaaS.API.csproj -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_332C9D14D18747A3B0FEF989E31C7DA1 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_DDB92643F59241919EA050E29FF6A6F5 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_868A221A4C404172BDA4C6642337E8C2 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'inventorysaas'
          slot-name: 'Production'
          package: .
